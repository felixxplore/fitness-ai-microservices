spring:
  data:
    mongodb:
      host: mongodb-activity
      port: 27017
      database: fitness_activity_db
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
  cloud:
    loadbalancer:
      retry:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    fetch-registry: true      # ← must be true (default is true, but verify)
    register-with-eureka: true
  instance:
    prefer-ip-address: true

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking

server:
  port: 8082

logging:
  level:
    org.springframework.cloud.loadbalancer: DEBUG